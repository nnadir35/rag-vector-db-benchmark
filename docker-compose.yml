services:
  qdrant-server:
    image: qdrant/qdrant:latest
    container_name: qdrant-server
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-net

  chroma-server:
    image: chromadb/chroma:latest
    container_name: chroma-server
    ports:
      - "8001:8000" # Dışarıdan 8001, içeriden 8000
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma_data:/chroma/data
    networks:
      - rag-net

  rag-app:
    build: .
    container_name: rag-app
    environment:
      - QDRANT_HOST=qdrant-server
      - QDRANT_PORT=6333
      - CHROMA_HOST=chroma-server
      - CHROMA_PORT=8000
    depends_on:
      - qdrant-server
      - chroma-server
    networks:
      - rag-net

volumes:
  qdrant_storage:
  chroma_data:

networks:
  rag-net:
    driver: bridge